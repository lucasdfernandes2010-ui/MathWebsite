<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Log</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: lightyellow;
            margin: 20px;
        }

        nav{
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            margin-bottom: 20px;
            background: white;
            border: 2px solid purple;
            border-radius: 10px;
        }

        nav a{
            text-decoration: none;
            color: purple;
            font-weight: bold;
        }

        nav a:hover{
            color: darkcyan;
        }

        h1{
            text-align: center;
        }

        textarea{
            width: 100%;
            height: 600px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            border: 2px solid black;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="error-log.html">Error Log</a>
    <a href="idea-log.html">Idea Log</a>
</nav>

<h1>Idea Log</h1>

<textarea
    id="ideaLog"
    placeholder="Write your ideas here..."
></textarea>

<script>

const ideaLog = document.getElementById("ideaLog");

// Load previous ideas
ideaLog.value = localStorage.getItem("ideaLog") || "";

// Save automatically whenever the user types
ideaLog.addEventListener("input", function () {

    localStorage.setItem("ideaLog", ideaLog.value);

});

</script>

</body>
</html>
